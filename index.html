<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📱 تعديل الطلبات • تل السنديان (موبايل)</title>
    <link rel="icon" href="https://iili.io/qfhk5Pt.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 20%, #386f2e, #1f4a18);
            color: #1e3b1a;
            direction: rtl;
            padding: 12px;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        /* رأس الصفحة - تصميم عمودي للموبايل */
        .header {
            background: rgba(255, 249, 240, 0.96);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 14px 16px;
            margin-bottom: 20px;
            border: 1px solid #8B5A2B;
            box-shadow: 0 8px 20px rgba(0, 30, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }

        .logo-frame {
            width: 48px;
            height: 48px;
            background: #1a1a1a;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title h1 {
            color: #2D5A27;
            font-size: 1.4rem;
            font-weight: 900;
        }

        .title p {
            color: #8B5A2B;
            font-size: 0.7rem;
        }

        .controls {
            display: flex;
            justify-content: center;
        }

        .btn-refresh {
            background: #2D5A27;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s ease;
            width: 100%;
            justify-content: center;
        }

        .btn-refresh:active {
            transform: scale(0.97);
            background: #1f441a;
        }

        /* قائمة الطلبات */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-edit-card {
            background: #FFF9F0;
            border-radius: 28px;
            border: 1px solid #8B5A2B;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
            transition: 0.2s;
        }

        .card-header {
            background: linear-gradient(145deg, #2D5A27, #1f441a);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .order-id {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: -0.3px;
        }

        .order-status {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .card-body {
            padding: 14px;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #F5E6D3;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 18px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .info-label {
            font-weight: 700;
            color: #8B5A2B;
            font-size: 0.75rem;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 900;
            color: #2D5A27;
        }

        .table-number-input {
            width: 90px;
            padding: 8px 8px;
            border-radius: 40px;
            border: 2px solid #8B5A2B;
            font-family: inherit;
            font-size: 0.9rem;
            text-align: center;
            background: white;
        }

        /* جدول الأصناف - تمرير أفقي للموبايل */
        .items-table-wrapper {
            overflow-x: auto;
            margin: 12px 0;
            border-radius: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .items-table {
            width: 100%;
            min-width: 500px;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
        }

        .items-table th,
        .items-table td {
            padding: 10px 8px;
            text-align: right;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
        }

        .items-table th {
            background: #2D5A27;
            color: white;
            font-weight: 700;
            white-space: nowrap;
        }

        .item-name-input,
        .item-price-input,
        .item-qty-input {
            width: 100%;
            padding: 8px 6px;
            border: 1px solid #ccc;
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.8rem;
            text-align: center;
        }

        .btn-remove-item {
            background: #c33;
            color: white;
            border: none;
            padding: 8px 10px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        /* لوحة إضافة منتج */
        .add-item-panel {
            background: #F5E6D3;
            border-radius: 22px;
            padding: 14px;
            margin: 15px 0;
        }

        .add-item-title {
            font-weight: 900;
            margin-bottom: 12px;
            color: #2D5A27;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .product-select-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-search-select {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: 2px solid #8B5A2B;
            font-family: inherit;
            background: white;
            font-size: 0.85rem;
        }

        .price-qty-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .product-price-preview {
            background: #2D5A27;
            color: white;
            padding: 8px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            flex: 1;
            text-align: center;
        }

        .qty-input-small {
            width: 90px;
            padding: 10px;
            border-radius: 40px;
            border: 2px solid #8B5A2B;
            text-align: center;
            font-size: 0.9rem;
        }

        .btn-add-selected {
            background: #2D5A27;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            font-size: 0.9rem;
        }

        .btn-add-selected:active {
            transform: scale(0.97);
        }

        .order-total {
            font-size: 1.3rem;
            font-weight: 900;
            color: #2D5A27;
            text-align: left;
            margin: 12px 0;
            background: #E9DFCF;
            padding: 10px;
            border-radius: 30px;
        }

        .notes-area {
            width: 100%;
            padding: 12px;
            border-radius: 24px;
            border: 2px solid #8B5A2B;
            font-family: inherit;
            margin: 10px 0;
            resize: vertical;
            font-size: 0.85rem;
        }

        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 14px;
            background: #F5E6D3;
            border-top: 2px solid #8B5A2B;
        }

        .btn-save,
        .btn-cancel-order {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
            transition: 0.1s linear;
        }

        .btn-save {
            background: #2D5A27;
            color: white;
        }

        .btn-cancel-order {
            background: #c33;
            color: white;
        }

        .btn-save:active,
        .btn-cancel-order:active {
            transform: scale(0.97);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: #FFF9F0;
            border-radius: 30px;
            color: #8B5A2B;
            font-weight: bold;
        }

        .notification {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: #2D5A27;
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            z-index: 9999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-weight: bold;
            font-size: 0.85rem;
            width: 90%;
            text-align: center;
            animation: slideDown 0.25s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -100%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        /* تحسين اللمس */
        button,
        select,
        input,
        textarea {
            font-size: 16px; /* منع تكبير iOS التلقائي */
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            .card-body {
                padding: 12px;
            }
            .info-value {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-frame"><img src="https://iili.io/qfhk5Pt.png" alt="شعار"></div>
            <div class="title">
                <h1>📝 تعديل الطلبات</h1>
                <p>تل السنديان • تحكم كامل للموبايل</p>
            </div>
        </div>
        <div class="controls">
            <button class="btn-refresh" id="refreshOrdersBtn"><i class="fas fa-sync-alt"></i> تحديث الطلبات</button>
        </div>
    </div>
    <div id="ordersList" class="orders-list">
        <div class="empty-state">جاري تحميل الطلبات...</div>
    </div>
</div>

<script>
    // ======================== إعدادات API ========================
    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbzrpyoGf6MCmWQ6Pbi_NAj59_LBwUzqxcrdbyUQrAfJoCzNpByzhSZHOilK34Tno20i9A/exec';
    const MENU_API_URL = 'https://script.google.com/macros/s/AKfycbyf1LnxXlGpllpyNeO9Gez1ah-DUSaVfTk3KhPDV8lDtN_Zga1GMZDaM387o0XWhIIW/exec';

    let allOrders = [];
    let menuProducts = [];

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function safeParseItems(items) {
        if (!items) return [];
        if (Array.isArray(items)) return items;
        if (typeof items === 'string') {
            try { return JSON.parse(items); } catch(e) { return []; }
        }
        return [];
    }

    function extractNumber(value) {
        if (value === null || value === undefined) return 0;
        if (typeof value === 'number') return value;
        const num = parseFloat(String(value).replace(/[^0-9.-]+/g, ''));
        return isNaN(num) ? 0 : num;
    }

    // جلب المنتجات من القائمة
    async function loadMenuProducts() {
        try {
            const response = await fetch(`${MENU_API_URL}?action=getMenuData&_=${Date.now()}`);
            const data = await response.json();
            if (data.success && data.products) {
                menuProducts = data.products.map(p => ({
                    id: p.id,
                    name: p.name,
                    price: parseFloat(p.price) || 0,
                    categoryId: p.categoryId
                }));
                console.log(`تم تحميل ${menuProducts.length} منتج`);
            } else {
                console.warn('استخدام بيانات تجريبية');
                menuProducts = [
                    { id: '1', name: 'نسكافيه', price: 2.5 },
                    { id: '2', name: 'كابتشينو', price: 3.0 },
                    { id: '3', name: 'شاي', price: 1.5 },
                    { id: '4', name: 'ماء معدني', price: 0.75 }
                ];
            }
        } catch (err) {
            console.error('خطأ في جلب المنتجات:', err);
            menuProducts = [];
        }
    }

    async function fetchOrders() {
        const container = document.getElementById('ordersList');
        container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
        try {
            const url = `${API_BASE_URL}?action=getOrders&_=${Date.now()}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.success && Array.isArray(data.orders)) {
                allOrders = data.orders.map(order => ({
                    ...order,
                    items: safeParseItems(order.items),
                    notes: order.notes || '',
                    tableNumber: order.tableNumber || '?'
                }));
                renderOrders();
            } else {
                throw new Error(data.error || 'تنسيق بيانات غير صحيح');
            }
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> خطأ: ${err.message}<br><br><button class="btn-refresh" onclick="fetchOrders()">محاولة مرة أخرى</button></div>`;
        }
    }

    function calculateOrderTotal(order) {
        const items = safeParseItems(order.items);
        return items.reduce((sum, item) => sum + (extractNumber(item.price) * extractNumber(item.quantity)), 0);
    }

    function renderOrders() {
        const container = document.getElementById('ordersList');
        if (!allOrders.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i> لا توجد طلبات حالياً</div>`;
            return;
        }

        container.innerHTML = allOrders.map(order => {
            const itemsArray = safeParseItems(order.items);
            return `
            <div class="order-edit-card" data-order-id="${escapeHtml(order.orderId)}">
                <div class="card-header">
                    <span class="order-id">${escapeHtml(order.orderId)}</span>
                    <span class="order-status"><i class="fas ${order.status === 'preparing' ? 'fa-fire' : (order.status === 'cancelled' ? 'fa-ban' : 'fa-check')}"></i> ${order.status === 'preparing' ? 'قيد التحضير' : (order.status === 'cancelled' ? 'ملغي' : 'مكتمل')}</span>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <div class="info-item">
                            <span class="info-label">رقم الطاولة</span>
                            <input type="number" class="table-number-input" value="${extractNumber(order.tableNumber)}" style="width:100px;">
                        </div>
                        <div class="info-item">
                            <span class="info-label">الوقت</span>
                            <span class="info-value">${new Date(order.timestamp).toLocaleString('ar-EG')}</span>
                        </div>
                    </div>
                    
                    <div class="items-table-wrapper">
                        <table class="items-table">
                            <thead><tr><th>الصنف</th><th>السعر (د.أ)</th><th>الكمية</th><th>المجموع</th><th></th></tr></thead>
                            <tbody id="items-tbody-${order.orderId}">
                                ${itemsArray.map((item, idx) => {
                                    const price = extractNumber(item.price);
                                    const quantity = extractNumber(item.quantity);
                                    return `
                                    <tr data-item-index="${idx}">
                                        <td><input type="text" class="item-name-input" value="${escapeHtml(item.name)}" style="width:100px;"></td>
                                        <td><input type="number" step="0.01" class="item-price-input" value="${price}" style="width:80px;"></td>
                                        <td><input type="number" class="item-qty-input" value="${quantity}" style="width:70px;"></td>
                                        <td class="item-total-display">${(price * quantity).toFixed(2)}</td>
                                        <td><button class="btn-remove-item" data-order-id="${order.orderId}" data-item-idx="${idx}"><i class="fas fa-trash-alt"></i> حذف</button></td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="add-item-panel">
                        <div class="add-item-title"><i class="fas fa-plus-circle"></i> إضافة منتج من القائمة</div>
                        <div class="product-select-row">
                            <select id="product-select-${order.orderId}" class="product-search-select">
                                <option value="">-- اختر منتجاً --</option>
                                ${menuProducts.map(p => `<option value="${escapeHtml(p.id)}" data-price="${p.price}" data-name="${escapeHtml(p.name)}">${escapeHtml(p.name)} - ${p.price.toFixed(2)} د.أ</option>`).join('')}
                            </select>
                            <div class="price-qty-row">
                                <span class="product-price-preview" id="price-preview-${order.orderId}">0.00 د.أ</span>
                                <input type="number" id="add-qty-${order.orderId}" placeholder="الكمية" value="1" class="qty-input-small">
                            </div>
                            <button class="btn-add-selected" data-order-id="${order.orderId}"><i class="fas fa-cart-plus"></i> إضافة إلى الطلب</button>
                        </div>
                    </div>
                    
                    <div class="order-total" id="total-${order.orderId}">المجموع: ${calculateOrderTotal(order).toFixed(2)} د.أ</div>
                    
                    <textarea class="notes-area" id="notes-${order.orderId}" rows="2" placeholder="ملاحظات الطلب...">${escapeHtml(order.notes)}</textarea>
                </div>
                <div class="card-actions">
                    <button class="btn-save" data-order-id="${order.orderId}"><i class="fas fa-save"></i> حفظ التعديلات</button>
                    ${order.status !== 'cancelled' ? `<button class="btn-cancel-order" data-order-id="${order.orderId}"><i class="fas fa-ban"></i> إلغاء الطلب بالكامل</button>` : ''}
                </div>
            </div>
        `}).join('');

        attachAllEvents();
    }

    function attachAllEvents() {
        // أزرار إضافة منتج
        document.querySelectorAll('.btn-add-selected').forEach(btn => {
            btn.removeEventListener('click', window.addHandler);
            const handler = () => addProductToOrder(btn.dataset.orderId);
            btn.addEventListener('click', handler);
            btn.addHandler = handler;
        });
        // أزرار حذف صنف
        document.querySelectorAll('.btn-remove-item').forEach(btn => {
            btn.removeEventListener('click', window.removeHandler);
            const handler = () => {
                const orderId = btn.dataset.orderId;
                const idx = parseInt(btn.dataset.itemIdx);
                removeItemFromOrder(orderId, idx);
            };
            btn.addEventListener('click', handler);
            btn.removeHandler = handler;
        });
        // حفظ التعديلات
        document.querySelectorAll('.btn-save').forEach(btn => {
            btn.removeEventListener('click', window.saveHandler);
            const handler = () => saveOrderChanges(btn.dataset.orderId);
            btn.addEventListener('click', handler);
            btn.saveHandler = handler;
        });
        // إلغاء الطلب
        document.querySelectorAll('.btn-cancel-order').forEach(btn => {
            btn.removeEventListener('click', window.cancelHandler);
            const handler = () => {
                if (confirm('هل أنت متأكد من إلغاء هذا الطلب بالكامل؟')) {
                    cancelOrder(btn.dataset.orderId);
                }
            };
            btn.addEventListener('click', handler);
            btn.cancelHandler = handler;
        });

        // معاينة سعر المنتج عند التغيير
        allOrders.forEach(order => {
            const select = document.getElementById(`product-select-${order.orderId}`);
            if (select && !select._listener) {
                select.addEventListener('change', () => {
                    const selectedOption = select.options[select.selectedIndex];
                    const price = selectedOption.getAttribute('data-price') || 0;
                    const previewSpan = document.getElementById(`price-preview-${order.orderId}`);
                    if (previewSpan) previewSpan.innerText = `${parseFloat(price).toFixed(2)} د.أ`;
                });
                select._listener = true;
            }
        });

        // ربط التحديث المباشر للمجموع في كل صف
        attachRealtimeTotals();
    }

    function attachRealtimeTotals() {
        allOrders.forEach(order => {
            const tbody = document.getElementById(`items-tbody-${order.orderId}`);
            if (!tbody) return;
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => {
                const priceInput = row.querySelector('.item-price-input');
                const qtyInput = row.querySelector('.item-qty-input');
                const totalSpan = row.querySelector('.item-total-display');
                const updateRowTotal = () => {
                    const price = extractNumber(priceInput.value);
                    const qty = extractNumber(qtyInput.value);
                    if (totalSpan) totalSpan.innerText = (price * qty).toFixed(2);
                    recalcOrderTotal(order.orderId);
                };
                priceInput.removeEventListener('input', updateRowTotal);
                qtyInput.removeEventListener('input', updateRowTotal);
                priceInput.addEventListener('input', updateRowTotal);
                qtyInput.addEventListener('input', updateRowTotal);
            });
        });
    }

    function recalcOrderTotal(orderId) {
        let total = 0;
        const tbody = document.getElementById(`items-tbody-${orderId}`);
        if (tbody) {
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => {
                const price = extractNumber(row.querySelector('.item-price-input')?.value);
                const qty = extractNumber(row.querySelector('.item-qty-input')?.value);
                total += price * qty;
            });
        }
        const totalSpan = document.getElementById(`total-${orderId}`);
        if (totalSpan) totalSpan.innerText = `المجموع: ${total.toFixed(2)} د.أ`;
    }

    function addProductToOrder(orderId) {
        const select = document.getElementById(`product-select-${orderId}`);
        const selectedOption = select.options[select.selectedIndex];
        const productId = select.value;
        if (!productId) {
            showNotification('الرجاء اختيار منتج', 'error');
            return;
        }
        const productName = selectedOption.getAttribute('data-name');
        const productPrice = parseFloat(selectedOption.getAttribute('data-price'));
        let quantity = parseInt(document.getElementById(`add-qty-${orderId}`).value);
        if (isNaN(quantity) || quantity < 1) quantity = 1;

        const order = allOrders.find(o => o.orderId === orderId);
        if (!order) return;

        let items = safeParseItems(order.items);
        items.push({ name: productName, price: productPrice, quantity: quantity });
        order.items = items;
        renderOrders();
        showNotification(`✓ تمت إضافة "${productName}"`, 'success');
    }

    function removeItemFromOrder(orderId, idx) {
        const order = allOrders.find(o => o.orderId === orderId);
        if (order) {
            let items = safeParseItems(order.items);
            if (items[idx]) {
                items.splice(idx, 1);
                order.items = items;
                renderOrders();
                showNotification('تم حذف الصنف', 'success');
            }
        }
    }

    async function saveOrderChanges(orderId) {
        const order = allOrders.find(o => o.orderId === orderId);
        if (!order) return;
        const card = document.querySelector(`.order-edit-card[data-order-id="${orderId}"]`);
        const newTableNumber = parseInt(card.querySelector('.table-number-input').value);
        const newNotes = document.getElementById(`notes-${orderId}`).value;
        const tbody = document.getElementById(`items-tbody-${orderId}`);
        const rows = tbody.querySelectorAll('tr');
        const newItems = [];
        for (let row of rows) {
            const name = row.querySelector('.item-name-input').value.trim();
            const price = extractNumber(row.querySelector('.item-price-input').value);
            const quantity = extractNumber(row.querySelector('.item-qty-input').value);
            if (name && quantity > 0) {
                newItems.push({ name, price, quantity });
            }
        }
        if (newItems.length === 0) {
            showNotification('لا يمكن حفظ طلب بدون أصناف', 'error');
            return;
        }
        order.tableNumber = newTableNumber;
        order.notes = newNotes;
        order.items = newItems;
        order.total = calculateOrderTotal(order).toFixed(2);
        order.itemsCount = newItems.reduce((s, i) => s + i.quantity, 0);
        order.lastModified = new Date().toISOString();

        try {
            const formData = new URLSearchParams();
            formData.append('action', 'updateOrderItems');
            formData.append('orderId', order.orderId);
            formData.append('data', JSON.stringify({
                tableNumber: order.tableNumber,
                notes: order.notes,
                items: order.items,
                total: order.total,
                itemsCount: order.itemsCount,
                lastModified: order.lastModified
            }));
            await fetch(API_BASE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
            showNotification(`تم حفظ التعديلات للطلب ${order.orderId}`, 'success');
            await fetchOrders();
        } catch (err) {
            console.error(err);
            showNotification('خطأ في حفظ التعديلات', 'error');
        }
    }

    async function cancelOrder(orderId) {
        try {
            const formData = new URLSearchParams();
            formData.append('action', 'cancelOrder');
            formData.append('orderId', orderId);
            formData.append('reason', 'تم الإلغاء من لوحة التعديل (موبايل)');
            await fetch(API_BASE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
            showNotification(`تم إلغاء الطلب ${orderId}`, 'success');
            await fetchOrders();
        } catch (err) {
            showNotification('فشل إلغاء الطلب', 'error');
        }
    }

    function showNotification(msg, type = 'info') {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.style.background = type === 'error' ? '#c33' : '#2D5A27';
        notif.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2800);
    }

    document.getElementById('refreshOrdersBtn').addEventListener('click', fetchOrders);

    (async () => {
        await loadMenuProducts();
        await fetchOrders();
    })();
</script>
</body>
</html>
