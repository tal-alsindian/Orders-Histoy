<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📝 تعديل الطلبات • تل السنديان</title>
    <link rel="icon" href="https://iili.io/qfhk5Pt.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --forest-green: #2D5A27;
            --olive-green: #4A7B3D;
            --clay-brown: #8B5A2B;
            --cream-white: #FFF9F0;
            --sandy-beige: #F5E6D3;
            --pure-white: #FFFFFF;
            --text-dark: #1e3b1a;
            --shadow-md: 0 15px 30px rgba(0, 30, 0, 0.15);
            --shadow-lg: 0 25px 50px rgba(0, 20, 0, 0.25);
            --radius-lg: 30px;
            --transition-smooth: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: radial-gradient(circle at 10% 20%, #386f2e, #1f4a18);
            color: var(--text-dark);
            direction: rtl;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255, 249, 240, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid var(--clay-brown);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-frame {
            width: 55px;
            height: 55px;
            background: #1a1a1a;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #4CAF50;
            box-shadow: 0 0 0 5px rgba(76,175,80,0.2);
        }
        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .title h1 {
            color: var(--forest-green);
            font-size: 1.7rem;
        }
        .title p {
            color: var(--clay-brown);
            font-size: 0.9rem;
        }
        .controls {
            display: flex;
            gap: 12px;
        }
        .btn-refresh {
            background: var(--forest-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-smooth);
        }
        .btn-refresh:hover {
            transform: scale(1.02);
            background: #1f441a;
        }
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .order-edit-card {
            background: var(--cream-white);
            border-radius: 28px;
            border: 2px solid var(--clay-brown);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: var(--transition-smooth);
        }
        .order-edit-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .card-header {
            background: linear-gradient(145deg, var(--forest-green), #1f441a);
            color: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .order-id {
            font-size: 1.3rem;
            font-weight: 900;
        }
        .order-status {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .card-body {
            padding: 20px;
        }
        .info-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: var(--sandy-beige);
            padding: 15px;
            border-radius: 20px;
        }
        .info-item {
            flex: 1;
        }
        .info-label {
            font-weight: 700;
            color: var(--clay-brown);
            font-size: 0.8rem;
        }
        .info-value {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--forest-green);
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .items-table th, .items-table td {
            padding: 10px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }
        .items-table th {
            background: var(--forest-green);
            color: white;
        }
        .item-name-input, .item-price-input, .item-qty-input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-family: inherit;
        }
        .add-item-panel {
            background: var(--sandy-beige);
            border-radius: 24px;
            padding: 15px;
            margin: 15px 0;
        }
        .add-item-title {
            font-weight: 900;
            margin-bottom: 12px;
            color: var(--forest-green);
        }
        .product-select-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .product-search-select {
            flex: 3;
            padding: 10px;
            border-radius: 40px;
            border: 2px solid var(--clay-brown);
            font-family: inherit;
            background: white;
        }
        .product-price-preview {
            background: var(--forest-green);
            color: white;
            padding: 8px 15px;
            border-radius: 40px;
            font-weight: bold;
        }
        .btn-add-selected {
            background: var(--forest-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-remove-item {
            background: #c33;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
        }
        .order-total {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--forest-green);
            text-align: left;
            margin: 15px 0;
        }
        .notes-area {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid var(--clay-brown);
            font-family: inherit;
            margin: 10px 0;
        }
        .card-actions {
            display: flex;
            gap: 12px;
            padding: 15px 20px;
            background: var(--sandy-beige);
            border-top: 2px solid var(--clay-brown);
            flex-wrap: wrap;
        }
        .btn-save, .btn-cancel-order {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition-smooth);
        }
        .btn-save {
            background: var(--forest-green);
            color: white;
        }
        .btn-cancel-order {
            background: #c33;
            color: white;
        }
        .btn-save:hover, .btn-cancel-order:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            background: var(--cream-white);
            border-radius: 30px;
            color: var(--clay-brown);
        }
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--forest-green);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 9999;
            box-shadow: var(--shadow-lg);
            font-weight: bold;
            animation: slideDown 0.3s;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translate(-50%, -100%); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        @media (max-width: 700px) {
            .items-table th, .items-table td { font-size: 0.8rem; }
            .info-value { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-frame"><img src="https://iili.io/qfhk5Pt.png" alt="شعار"></div>
            <div class="title">
                <h1>📝 تعديل وإدارة الطلبات</h1>
                <p>تل السنديان • نظام التحكم الكامل</p>
            </div>
        </div>
        <div class="controls">
            <button class="btn-refresh" id="refreshOrdersBtn"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
    </div>
    <div id="ordersList" class="orders-list">
        <div class="empty-state">جاري تحميل الطلبات...</div>
    </div>
</div>

<script>
    // ======================== الإعدادات ========================
    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbzrpyoGf6MCmWQ6Pbi_NAj59_LBwUzqxcrdbyUQrAfJoCzNpByzhSZHOilK34Tno20i9A/exec'; // استبدل بالرابط الصحيح
    const MENU_API_URL = 'https://script.google.com/macros/s/AKfycbyf1LnxXlGpllpyNeO9Gez1ah-DUSaVfTk3KhPDV8lDtN_Zga1GMZDaM387o0XWhIIW/exec'; // رابط جلب المنتجات

    let allOrders = [];
    let menuProducts = []; // مصفوفة المنتجات { id, name, price, categoryId, ... }

    function escapeHtml(str) {
        if (str === null || str === undefined) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function safeParseItems(items) {
        if (!items) return [];
        if (Array.isArray(items)) return items;
        if (typeof items === 'string') {
            try { return JSON.parse(items); } catch(e) { return []; }
        }
        return [];
    }

    function extractNumber(value) {
        if (value === null || value === undefined) return 0;
        if (typeof value === 'number') return value;
        const num = parseFloat(String(value).replace(/[^0-9.-]+/g, ''));
        return isNaN(num) ? 0 : num;
    }

    // جلب قائمة المنتجات من نفس مصدر menu.html
    async function loadMenuProducts() {
        try {
            const response = await fetch(`${MENU_API_URL}?action=getMenuData&_=${Date.now()}`);
            const data = await response.json();
            if (data.success && data.products) {
                menuProducts = data.products.map(p => ({
                    id: p.id,
                    name: p.name,
                    price: parseFloat(p.price) || 0,
                    categoryId: p.categoryId
                }));
                console.log(`تم تحميل ${menuProducts.length} منتج`);
            } else {
                console.warn('فشل تحميل المنتجات، سيتم استخدام بيانات تجريبية');
                menuProducts = [
                    { id: '1', name: 'نسكافيه', price: 2.5 },
                    { id: '2', name: 'كابتشينو', price: 3.0 },
                    { id: '3', name: 'شاي', price: 1.5 }
                ];
            }
        } catch (err) {
            console.error('خطأ في جلب المنتجات:', err);
            menuProducts = [];
        }
    }

    async function fetchOrders() {
        const container = document.getElementById('ordersList');
        container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
        try {
            const url = `${API_BASE_URL}?action=getOrders&_=${Date.now()}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.success && Array.isArray(data.orders)) {
                allOrders = data.orders.map(order => ({
                    ...order,
                    items: safeParseItems(order.items),
                    notes: order.notes || '',
                    tableNumber: order.tableNumber || '?'
                }));
                renderOrders();
            } else {
                throw new Error(data.error || 'تنسيق بيانات غير صحيح');
            }
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> خطأ: ${err.message}<br><br><button class="btn-refresh" onclick="fetchOrders()">محاولة مرة أخرى</button></div>`;
        }
    }

    function renderOrders() {
        const container = document.getElementById('ordersList');
        if (!allOrders.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-receipt"></i> لا توجد طلبات حالياً</div>`;
            return;
        }

        container.innerHTML = allOrders.map(order => {
            const itemsArray = safeParseItems(order.items);
            return `
            <div class="order-edit-card" data-order-id="${escapeHtml(order.orderId)}">
                <div class="card-header">
                    <span class="order-id">${escapeHtml(order.orderId)}</span>
                    <span class="order-status"><i class="fas ${order.status === 'preparing' ? 'fa-fire' : (order.status === 'cancelled' ? 'fa-ban' : 'fa-check')}"></i> ${order.status === 'preparing' ? 'قيد التحضير' : (order.status === 'cancelled' ? 'ملغي' : 'مكتمل')}</span>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <div class="info-item"><div class="info-label">رقم الطاولة</div><div class="info-value"><input type="number" class="table-number-input" value="${extractNumber(order.tableNumber)}" style="width:80px; padding:5px; border-radius:20px; border:2px solid var(--clay-brown);"></div></div>
                        <div class="info-item"><div class="info-label">الوقت</div><div class="info-value">${new Date(order.timestamp).toLocaleString('ar-EG')}</div></div>
                    </div>
                    
                    <table class="items-table">
                        <thead><tr><th>الصنف</th><th>السعر (د.أ)</th><th>الكمية</th><th>الإجمالي</th><th></th></tr></thead>
                        <tbody id="items-tbody-${order.orderId}">
                            ${itemsArray.map((item, idx) => {
                                const price = extractNumber(item.price);
                                const quantity = extractNumber(item.quantity);
                                return `
                                <tr data-item-index="${idx}">
                                    <td><input type="text" class="item-name-input" value="${escapeHtml(item.name)}" style="width:100%"></td>
                                    <td><input type="number" step="0.01" class="item-price-input" value="${price}" style="width:80px"></td>
                                    <td><input type="number" class="item-qty-input" value="${quantity}" style="width:70px"></td>
                                    <td class="item-total-display">${(price * quantity).toFixed(2)}</td>
                                    <td><button class="btn-remove-item" data-order-id="${order.orderId}" data-item-idx="${idx}"><i class="fas fa-trash-alt"></i></button></td>
                                
                            `}).join('')}
                        </tbody>
                    </table>
                    
                    <div class="add-item-panel">
                        <div class="add-item-title"><i class="fas fa-plus-circle"></i> إضافة منتج من القائمة</div>
                        <div class="product-select-row">
                            <select id="product-select-${order.orderId}" class="product-search-select">
                                <option value="">-- اختر منتجاً --</option>
                                ${menuProducts.map(p => `<option value="${escapeHtml(p.id)}" data-price="${p.price}" data-name="${escapeHtml(p.name)}">${escapeHtml(p.name)} - ${p.price.toFixed(2)} د.أ</option>`).join('')}
                            </select>
                            <span class="product-price-preview" id="price-preview-${order.orderId}">0.00 د.أ</span>
                            <input type="number" id="add-qty-${order.orderId}" placeholder="الكمية" value="1" style="width:80px; padding:8px; border-radius:40px; border:2px solid var(--clay-brown); text-align:center;">
                            <button class="btn-add-selected" data-order-id="${order.orderId}"><i class="fas fa-cart-plus"></i> إضافة</button>
                        </div>
                    </div>
                    
                    <div class="order-total" id="total-${order.orderId}">المجموع: ${calculateOrderTotal(order).toFixed(2)} د.أ</div>
                    
                    <textarea class="notes-area" id="notes-${order.orderId}" rows="2" placeholder="ملاحظات الطلب...">${escapeHtml(order.notes)}</textarea>
                </div>
                <div class="card-actions">
                    <button class="btn-save" data-order-id="${order.orderId}"><i class="fas fa-save"></i> حفظ التعديلات</button>
                    ${order.status !== 'cancelled' ? `<button class="btn-cancel-order" data-order-id="${order.orderId}"><i class="fas fa-ban"></i> إلغاء الطلب بالكامل</button>` : ''}
                </div>
            </div>
        `}).join('');

        attachEvents();
        attachProductSelectEvents();
    }

    function attachEvents() {
        document.querySelectorAll('.btn-add-selected').forEach(btn => {
            btn.addEventListener('click', () => addProductToOrder(btn.dataset.orderId));
        });
        document.querySelectorAll('.btn-remove-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const orderId = btn.dataset.orderId;
                const idx = parseInt(btn.dataset.itemIdx);
                removeItemFromOrder(orderId, idx);
            });
        });
        document.querySelectorAll('.btn-save').forEach(btn => {
            btn.addEventListener('click', () => saveOrderChanges(btn.dataset.orderId));
        });
        document.querySelectorAll('.btn-cancel-order').forEach(btn => {
            btn.addEventListener('click', () => {
                if (confirm('هل أنت متأكد من إلغاء هذا الطلب بالكامل؟')) {
                    cancelOrder(btn.dataset.orderId);
                }
            });
        });

        for (let order of allOrders) {
            attachRealtimeTotal(order.orderId);
        }
    }

    function attachProductSelectEvents() {
        allOrders.forEach(order => {
            const select = document.getElementById(`product-select-${order.orderId}`);
            if (select) {
                select.addEventListener('change', () => {
                    const selectedOption = select.options[select.selectedIndex];
                    const price = selectedOption.getAttribute('data-price') || 0;
                    document.getElementById(`price-preview-${order.orderId}`).innerText = `${parseFloat(price).toFixed(2)} د.أ`;
                });
            }
        });
    }

    function addProductToOrder(orderId) {
        const select = document.getElementById(`product-select-${orderId}`);
        const selectedOption = select.options[select.selectedIndex];
        const productId = select.value;
        if (!productId) {
            showNotification('الرجاء اختيار منتج', 'error');
            return;
        }
        const productName = selectedOption.getAttribute('data-name');
        const productPrice = parseFloat(selectedOption.getAttribute('data-price'));
        let quantity = parseInt(document.getElementById(`add-qty-${orderId}`).value);
        if (isNaN(quantity) || quantity < 1) quantity = 1;

        const order = allOrders.find(o => o.orderId === orderId);
        if (!order) return;

        let items = safeParseItems(order.items);
        items.push({ name: productName, price: productPrice, quantity: quantity });
        order.items = items;
        renderOrders();
        showNotification(`تمت إضافة "${productName}" إلى الطلب`, 'success');
    }

    function removeItemFromOrder(orderId, idx) {
        const order = allOrders.find(o => o.orderId === orderId);
        if (order) {
            let items = safeParseItems(order.items);
            if (items[idx]) {
                items.splice(idx, 1);
                order.items = items;
                renderOrders();
                showNotification('تم حذف الصنف', 'success');
            }
        }
    }

    function calculateOrderTotal(order) {
        const items = safeParseItems(order.items);
        return items.reduce((sum, item) => sum + (extractNumber(item.price) * extractNumber(item.quantity)), 0);
    }

    function attachRealtimeTotal(orderId) {
        const tbody = document.getElementById(`items-tbody-${orderId}`);
        if (!tbody) return;
        const rows = tbody.querySelectorAll('tr');
        rows.forEach(row => {
            const priceInput = row.querySelector('.item-price-input');
            const qtyInput = row.querySelector('.item-qty-input');
            const totalSpan = row.querySelector('.item-total-display');
            const update = () => {
                const price = extractNumber(priceInput.value);
                const qty = extractNumber(qtyInput.value);
                totalSpan.innerText = (price * qty).toFixed(2);
                recalcOrderTotal(orderId);
            };
            priceInput.addEventListener('input', update);
            qtyInput.addEventListener('input', update);
        });
    }

    function recalcOrderTotal(orderId) {
        let total = 0;
        const tbody = document.getElementById(`items-tbody-${orderId}`);
        if (tbody) {
            const rows = tbody.querySelectorAll('tr');
            rows.forEach(row => {
                const price = extractNumber(row.querySelector('.item-price-input')?.value);
                const qty = extractNumber(row.querySelector('.item-qty-input')?.value);
                total += price * qty;
            });
        }
        const totalSpan = document.getElementById(`total-${orderId}`);
        if (totalSpan) totalSpan.innerText = `المجموع: ${total.toFixed(2)} د.أ`;
    }

    async function saveOrderChanges(orderId) {
        const order = allOrders.find(o => o.orderId === orderId);
        if (!order) return;
        const card = document.querySelector(`.order-edit-card[data-order-id="${orderId}"]`);
        const newTableNumber = parseInt(card.querySelector('.table-number-input').value);
        const newNotes = document.getElementById(`notes-${orderId}`).value;
        const tbody = document.getElementById(`items-tbody-${orderId}`);
        const rows = tbody.querySelectorAll('tr');
        const newItems = [];
        for (let row of rows) {
            const name = row.querySelector('.item-name-input').value.trim();
            const price = extractNumber(row.querySelector('.item-price-input').value);
            const quantity = extractNumber(row.querySelector('.item-qty-input').value);
            if (name && quantity > 0) {
                newItems.push({ name, price, quantity });
            }
        }
        if (newItems.length === 0) {
            showNotification('لا يمكن حفظ طلب بدون أصناف', 'error');
            return;
        }
        order.tableNumber = newTableNumber;
        order.notes = newNotes;
        order.items = newItems;
        order.total = calculateOrderTotal(order).toFixed(2);
        order.itemsCount = newItems.reduce((s, i) => s + i.quantity, 0);
        order.lastModified = new Date().toISOString();

        try {
            const formData = new URLSearchParams();
            formData.append('action', 'updateOrderItems');
            formData.append('orderId', order.orderId);
            formData.append('data', JSON.stringify({
                tableNumber: order.tableNumber,
                notes: order.notes,
                items: order.items,
                total: order.total,
                itemsCount: order.itemsCount,
                lastModified: order.lastModified
            }));
            await fetch(API_BASE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
            showNotification(`تم حفظ التعديلات للطلب ${order.orderId}`, 'success');
            await fetchOrders();
        } catch (err) {
            console.error(err);
            showNotification('خطأ في حفظ التعديلات', 'error');
        }
    }

    async function cancelOrder(orderId) {
        try {
            const formData = new URLSearchParams();
            formData.append('action', 'cancelOrder');
            formData.append('orderId', orderId);
            formData.append('reason', 'تم الإلغاء من لوحة التعديل');
            await fetch(API_BASE_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
            showNotification(`تم إلغاء الطلب ${orderId}`, 'success');
            await fetchOrders();
        } catch (err) {
            showNotification('فشل إلغاء الطلب', 'error');
        }
    }

    function showNotification(msg, type = 'info') {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.style.background = type === 'error' ? '#c33' : '#2D5A27';
        notif.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }

    document.getElementById('refreshOrdersBtn').addEventListener('click', fetchOrders);

    (async () => {
        await loadMenuProducts();
        await fetchOrders();
    })();
</script>
</body>
</html>
